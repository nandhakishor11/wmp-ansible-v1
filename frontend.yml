- name: Frontend set up
  hosts: all
  become: yes
  tasks:
    - name: repo file
      ansible.builtin.shell: curl -fsSL https://rpm.nodesource.com/setup_22.x | bash -

    - name: install nginx 
      ansible.builtin.dnf:
        name: 
          - '@nginx:1.26'
          - 'node'
        state: present

    - name: copy file
      ansible.builtin.copy:
        src: nginx.conf
        dest: /etc/nginx/nginx.conf

    - name: remove nginx default
      ansible.builtin.file:
        path: /usr/share/nginx/html
        state: absent

    - name: download and extract
      ansible.builtin.unarchive:
        src: https://raw.githubusercontent.com/raghudevopsb88/wealth-project/main/artifacts/frontend.tar.gz
        dest: /usr/share/nginx
        remote_src: yes
    
    - name: Build Frontend
      ansible.builtin.shell: npm ci ; npm run build ; mv dist html
      args:
        chdir: /usr/share/nginx
    
    - name: start nginx service
      ansible.builtin.systemd_service:
        name: nginx
        enabled: true
        state: restarted
  
    